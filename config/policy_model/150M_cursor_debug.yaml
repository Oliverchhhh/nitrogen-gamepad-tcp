shared:
  # Cursor/断点调试专用输出目录
  output_path: output/policy_model/150M_cursor_debug
  # 进一步缩短序列，方便单步调试
  n_seq_timesteps: 8
  frame_height: 192
  frame_width: 192
  text_tokenizer_config:
    text_tokenizer_name: "gemma"
    text_embedding_shape: [1, 768]
    text_annotation_model_version: ["gemini-2.5-flash", "gemini-2.5-flash-thinking-0905"]
  tokenizer:
    type: "conv"
    conv_tokenizer_config:
      num_tokens: 1
  # 与正式训练配置保持一致，使用 bf16 自动混合精度
  precision: "bf16-mixed"

inference:
  mouse_sampling_approach: "truncated_normal"

policy_model:
  n_transformer_layers: 1
  n_q_head: 2
  n_kv_head: 2
  n_thinking_tokens: 1
  transformer_dim: &transformer_dim 128
  mask_block_size: 16
  attention_history_len: [8]
  n_kv_sink_tokens: 0
  model_type: "dense"
  action_decoder:
    embed_dim: *transformer_dim

stage3_finetune:
  optim:
    learning_rate: 0.0003
    weight_decay: 0.0001
    beta_1: 0.9
    beta_2: 0.999

  # 调试：尽量少做验证，减少多进程噪音（需要验证时再手动调小）
  validation_step_interval: 999999
  n_validation_steps: 1

  # 断点调试：每一步都存 checkpoint，便于对比
  save_every_n_steps: 1
  n_training_steps: 5
  accumulate_grad_batches: 1

  training_dataset:
    batch_size: 1
    local_prefix: dataset
    warn_on_starvation: false
    rand_augmentation:
      fraction_augmented: 0.0
      augmentations: []
    n_preprocess_threads_per_gpu: 1
    preprocessed_chunks_queue_size_per_gpu: 1
    shuffle_buffer_size_per_gpu: 8
    dataset_worker_num_workers_per_gpu: 1
    dataset_worker_prefetch_factor: 1
    shuffled_chunks_queue_size_per_gpu: 1

  validation_datasets:
    - batch_size: 1
      local_prefix: dataset
      validation_name: "overall"
      n_preprocess_threads_per_gpu: 1
      preprocessed_chunks_queue_size_per_gpu: 1
      shuffled_chunks_queue_size_per_gpu: 1
      dataset_worker_prefetch_factor: 1
      warn_on_starvation: false

wandb:
  enabled: false
  project: "policy_model"
  exp_name: "cursor-debug-toy"

