# V-JEPA 2 Tokenizer 配置示例
# 这是一个示例配置文件，展示如何使用 V-JEPA 2 作为视觉编码器

shared:
  output_path: output/policy_model/150M_vjepa2
  n_seq_timesteps: 200
  frame_height: 192  # OpenP2P 的输入分辨率
  frame_width: 192
  text_tokenizer_config:
    text_tokenizer_name: "gemma"
    text_embedding_shape: [1, 768]
    text_annotation_model_version: ["gemini-2.5-flash", "gemini-2.5-flash-thinking-0905"]
  tokenizer:
    type: "vjepa2"  # 使用 V-JEPA 2 tokenizer
    vjepa_tokenizer_config:
      checkpoint_path: "D:/project/vjepa2/jepa_checkpoints/vitl.pt"  # 本地 checkpoint 路径
      model_name: "vit_large"  # vit_large, vit_huge, vit_giant, vit_giant_384
      frozen: true  # 冻结 V-JEPA 2 参数（推荐）
      img_size: 256  # V-JEPA 2 ViT-L 期望的输入尺寸（会自动 resize）
      patch_size: 16
      tubelet_size: 2
      num_frames: 64  # 预训练时使用的帧数（仅用于模型初始化）
      use_hub_fallback: false  # 如果本地 checkpoint 不存在，是否使用 torch.hub

inference:
  mouse_sampling_approach: "truncated_normal"

# Policy Model Configuration (Stage 2 student & 3 model)
policy_model:
  n_transformer_layers: 10
  n_q_head: 16
  n_kv_head: 16
  n_thinking_tokens: 1
  transformer_dim: &transformer_dim 1024
  mask_block_size: 128
  attention_history_len: [200, 200, 200, 200, 200, 200, 200, 200, 200, 200]
  n_kv_sink_tokens: 0
  model_type: "dense"
  action_decoder:
    embed_dim: *transformer_dim

stage3_finetune:
  optim:
    learning_rate: 0.0001
    weight_decay: 0.0001
    beta_1: 0.9
    beta_2: 0.999

  validation_step_interval: 20000
  n_validation_steps: &n_validation_steps 200
  save_every_n_steps: 10000
  n_training_steps: 500000
  accumulate_grad_batches: 1

  training_dataset:
    batch_size: &stage3_batch_size 2  # V-JEPA 2 模型较大，可能需要减小 batch size
    local_prefix: "dataset"
    warn_on_starvation: false
    always_labelled: true
    rand_augmentation:
      fraction_augmented: 1.0
      augmentations:
        - spatial_transform
        - color
        - planckian
        - iso_noise
        - translation
        - random_blur
        - sharpness
    n_preprocess_threads_per_gpu: 1
    preprocessed_chunks_queue_size_per_gpu: 16
    shuffle_buffer_size_per_gpu: 200
    dataset_worker_num_workers_per_gpu: 1
    dataset_worker_prefetch_factor: 2
    shuffled_chunks_queue_size_per_gpu: 2

  validation_datasets:
    - batch_size: *stage3_batch_size
      local_prefix: "dataset"
      validation_name: "overall"
      n_preprocess_threads_per_gpu: &validation_stage3_n_preprocess_threads_per_gpu 8
      preprocessed_chunks_queue_size_per_gpu: &validation_stage3_preprocessed_chunks_queue_size_per_gpu 1
      shuffled_chunks_queue_size_per_gpu: &validation_stage3_shuffled_chunks_queue_size_per_gpu 1
      dataset_worker_prefetch_factor: &validation_stage3_dataset_worker_prefetch_factor 8
      warn_on_starvation: false
      always_labelled: true

wandb:
  enabled: True
  entity: "zjut-cv"
  project: "policy_model"
  exp_name: "150M-vjepa2"  # 实验名称
