shared:
  output_path: output/policy_model/150M_nitrogen_current_gt_vjepa2
  n_seq_timesteps: 200
  frame_height: 192
  frame_width: 192
  action_mapping_type: "gamepad"
  gamepad_action_mapping:
    max_buttons: 6
    n_stick_bins: 3
    n_trigger_bins: 17
    stick_deadzone: 0.15
  text_tokenizer_config:
    text_tokenizer_name: "gemma"
    text_embedding_shape: [1, 768]
    text_annotation_model_version: ["gemini-2.5-flash", "gemini-2.5-flash-thinking-0905"]
  tokenizer:
    type: "conv"
    conv_tokenizer_config:
      num_tokens: 1

inference:
  mouse_sampling_approach: "truncated_normal"

policy_model:
  n_transformer_layers: 10
  n_q_head: 16
  n_kv_head: 16
  n_thinking_tokens: 1
  transformer_dim: &transformer_dim 1024
  mask_block_size: 128
  attention_history_len: [200, 200, 200, 200, 200, 200, 200, 200, 200, 200]
  n_kv_sink_tokens: 0
  model_type: "dense"
  action_decoder:
    embed_dim: *transformer_dim

stage3_finetune:
  init:
    auto_resume_latest_checkpoint: true
  future_vision_target_mode: "current"
  # 使用离线预计算的 V-JEPA2 表征，跳过在线推理
  use_precomputed_vision_features: true
  # 输入侧仍使用 shared.tokenizer (conv)；
  # 仅 state 监督目标使用 vjepa2.1 tokenizer（预计算模式下不加载）。
  state_target_tokenizer:
    type: "vjepa2"
    vjepa_tokenizer_config:
      checkpoint_path: "/data2T/rjt/nitrogen-openp2p2-future-frame/Vjepa2-1_ViT_B_16/vjepa2_1_vitb_dist_vitG_384.pt"
      model_name: "vjepa2_1_vit_base_384"
      checkpoint_key: "ema_encoder"
      frozen: true
      img_size: 192
      patch_size: 16
      tubelet_size: 2
      num_frames: 64
      use_hub_fallback: false
  optim:
    learning_rate: 0.0001
    weight_decay: 0.0001
    beta_1: 0.9
    beta_2: 0.999

  validation_step_interval: 999999  # 与 train_local_dataset 一致：训练期间不触发 validation
  n_validation_steps: &n_validation_steps 0  # 0 = Lightning 侧跳过 val batch
  save_every_n_steps: 10000
  n_training_steps: 500000
  accumulate_grad_batches: 1

  training_dataset:
    batch_size: &stage3_batch_size 2
    local_prefix: "dataset_nitrogen_toy"
    load_video_name: "192x192.mp4"
    warn_on_starvation: false
    always_labelled: true
    ignore_iterator_reset: true
    rand_augmentation:
      fraction_augmented: 1.0
      augmentations:
        - spatial_transform
        - color
        - planckian
        - iso_noise
        - translation
        - random_blur
        - sharpness
    n_preprocess_threads_per_gpu: 4
    preprocessed_chunks_queue_size_per_gpu: 32
    shuffle_buffer_size_per_gpu: 64
    dataset_worker_num_workers_per_gpu: 1
    dataset_worker_prefetch_factor: 2
    shuffled_chunks_queue_size_per_gpu: 4

  validation_datasets:
    - batch_size: *stage3_batch_size
      local_prefix: "dataset_nitrogen_toy"
      load_video_name: "192x192.mp4"
      validation_name: "overall"
      n_preprocess_threads_per_gpu: &validation_stage3_n_preprocess_threads_per_gpu 8
      preprocessed_chunks_queue_size_per_gpu: &validation_stage3_preprocessed_chunks_queue_size_per_gpu 1
      shuffled_chunks_queue_size_per_gpu: &validation_stage3_shuffled_chunks_queue_size 1
      dataset_worker_prefetch_factor: &validation_stage3_dataset_worker_prefetch_factor 8
      warn_on_starvation: false
      always_labelled: true

wandb:
  enabled: True
  entity: "zjut-cv"
  project: "policy_model"
  exp_name: "150M-local-nitrogen-dataset-current-gt-vjepa2"
