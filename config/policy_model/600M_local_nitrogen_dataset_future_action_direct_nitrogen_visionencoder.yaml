shared:
  output_path: output/policy_model/150M_nitrogen_cuphead_future_action_direct_nitrogen_visionencoder_F18_zero_action
  # 1(text)+256(image)+1(think)+1(action)+1(real)=260 tokens/frame
  # 4400 token 上限下，最多 floor(4400/260)=16 帧
  n_seq_timesteps: 16
  frame_height: 256
  frame_width: 256
  action_mapping_type: "gamepad_direct"
  gamepad_direct_action_mapping:
    n_stick_bins: 3
    stick_deadzone: 0.15
  text_tokenizer_config:
    text_tokenizer_name: "gemma"
    text_embedding_shape: [1, 768]
    text_annotation_model_version: ["gemini-2.5-flash", "gemini-2.5-flash-thinking-0905"]
  tokenizer:
    type: "nitrogen_checkpoint"
    nitrogen_checkpoint_tokenizer_config:
      checkpoint_path: "NitroGen_checkpoints/ng.pt"
      vision_encoder_name: "google/siglip2-large-patch16-256"
      vision_encoder_local_path: "./checkpoints/siglip2-large-patch16-256"
      image_size: 256
      use_image_processor_norm: true
      freeze_vision_encoder: true
      freeze_vl_self_attention_model: true
      expected_n_img_tokens: 256
      vision_hidden_size: 1024
      vl_num_layers: 4
      vl_num_attention_heads: 16
      vl_attention_head_dim: 64
      vl_dropout: 0.1
      vl_attention_bias: true
      vl_activation_fn: "gelu-approximate"
      vl_upcast_attention: false
      vl_max_num_positional_embeddings: 512 #same as checkpoint
      vl_compute_dtype: "float32"
      vl_final_dropout: true
      vl_positional_embeddings: "sinusoidal"
      strict_load: false

inference:
  mouse_sampling_approach: "truncated_normal"

policy_model:
  n_transformer_layers: 9
  n_q_head: 16
  n_kv_head: 16
  n_thinking_tokens: 1
  transformer_dim: &transformer_dim 2048
  mask_block_size: 128
  attention_history_len: [16, 16, 16, 16, 16, 16, 16, 16, 16, 16]
  n_kv_sink_tokens: 0
  model_type: "dense"
  n_future_action_tokens: 1
  # 预测 5 帧动作：当前帧 + 未来 4 帧
  n_future_frames: 5
  zero_action_input: true
  action_decoder:
    embed_dim: *transformer_dim

stage3_finetune:
  optim:
    learning_rate: 0.0001
    weight_decay: 0.0001
    beta_1: 0.9
    beta_2: 0.999

  validation_step_interval: 999999
  n_validation_steps: &n_validation_steps 0
  save_every_n_steps: 30000
  n_training_steps: 300000
  accumulate_grad_batches: 1

  training_dataset:
    batch_size: &stage3_batch_size 1
    local_prefix: "cuphead_dataset_converted"
    load_video_name: "256x256.mp4"
    warn_on_starvation: false
    always_labelled: true
    rand_augmentation:
      fraction_augmented: 1.0
      augmentations:
        - "color"
        - "planckian"
        - "iso_noise"
        - "random_blur"
    n_preprocess_threads_per_gpu: 2
    preprocessed_chunks_queue_size_per_gpu: 8
    shuffled_chunks_queue_size_per_gpu: 4
    dataset_worker_prefetch_factor: 2

  validation_datasets:
    - validation_name: "default_validation"
      batch_size: *stage3_batch_size
      local_prefix: "cuphead_dataset_converted"
      load_video_name: "256x256.mp4"
      n_preprocess_threads_per_gpu: &validation_stage3_n_preprocess_threads_per_gpu 8
      preprocessed_chunks_queue_size_per_gpu: &validation_stage3_preprocessed_chunks_queue_size_per_gpu 1
      shuffled_chunks_queue_size_per_gpu: &validation_stage3_shuffled_chunks_queue_size 1
      dataset_worker_prefetch_factor: &validation_stage3_dataset_worker_prefetch_factor 8
      warn_on_starvation: false
      always_labelled: true

wandb:
  enabled: True
  entity: "zjut-cv"
  project: "policy_model"
  exp_name: "150M-nitrogen-cuphead-future-action-direct-nitrogen-visionencoder-F18-zero-action"
